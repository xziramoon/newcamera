<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBORG // SCANNER-UPLINK (PRO) - WONGWIAN</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Orbitron:wght@400;700;900&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --o:  #ff6b35; --b:  #00d4ff; --g:  #00ff9d; --r:  #ff2255;
            --bg0: #010508; --bg1: #030c14; --ln:  rgba(0,212,255,.12);
            --txt: #c8dff0; --txt2: #7aaabf;
            --f-hud: 'Orbitron', monospace; --f-ui:  'Rajdhani', sans-serif; --f-th:  'Sarabun', sans-serif;
        }

        @keyframes scan-beam  { 0%{top:-20%} 100%{top:110%} }
        @keyframes blink      { 0%,100%{opacity:1} 49%,51%{opacity:0} }
        @keyframes pulse-laser { 0%,100%{opacity:1; box-shadow: 0 0 15px var(--r), 0 0 5px var(--r);} 50%{opacity:0.6; box-shadow: 0 0 5px var(--r);} }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--f-th); background: var(--bg0); color: var(--txt); display: flex; flex-direction: column; height: 100vh; overflow: hidden; background-image: radial-gradient(rgba(0,212,255,.05) 1px, transparent 1px); background-size: 28px 28px; }
        body::after { content:''; position:fixed; inset:0; background: repeating-linear-gradient( 0deg, rgba(0,0,0,.06) 0px, rgba(0,0,0,.06) 1px, transparent 1px, transparent 4px ); pointer-events:none; z-index:9999; }

        .header { background: var(--bg1); padding: 15px 20px; border-bottom: 1px solid var(--ln); position: relative; background-image: linear-gradient(135deg, rgba(255,107,53,.07) 0%, transparent 50%); }
        .header h1 { margin: 0; font-family: var(--f-hud); font-size: 18px; font-weight: 900; color: var(--o); letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 10px rgba(255,107,53,.5); }
        .hud-sub { font-family: var(--f-hud); font-size: 10px; letter-spacing: 2px; color: var(--b); margin-top: 5px; display: flex; align-items: center; gap: 7px; }
        .blink-dot { width:5px; height:5px; background: var(--b); border-radius:50%; box-shadow: 0 0 6px var(--b); animation: blink 1.4s step-start infinite; }

        #status-bar { padding: 10px 20px; font-family: var(--f-hud); font-size: 12px; letter-spacing: 1.5px; color: var(--b); border-bottom: 1px solid var(--ln); display: flex; align-items:center; background: rgba(0,212,255,.025); text-transform:uppercase; transition: color 0.3s; }

        .container { padding: 15px; flex: 1; display: flex; flex-direction: column; overflow-y: auto; z-index: 10;}
        .panel { background: rgba(6,18,32,.8); border: 1px solid var(--ln); position: relative; clip-path: polygon(10px 0%,100% 0%,100% calc(100% - 10px),calc(100% - 10px) 100%,0% 100%,0% 10px); padding: 15px; margin-bottom: 15px; }
        .p-lbl { font-family: var(--f-hud); font-size: 11px; font-weight:700; letter-spacing:2px; color: var(--o); text-transform:uppercase; border-bottom: 1px solid rgba(0,212,255,.07); padding-bottom: 8px; margin-bottom: 12px; }

        .inp { width:100%; background: rgba(0,0,0,.55); border: 1px solid rgba(0,212,255,.13); color: #e0eff8; font-family: var(--f-th); font-size: 16px; padding: 12px; outline:none; transition:.2s; clip-path: polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0% 100%,0% 5px); box-sizing: border-box; margin-bottom: 10px; }
        .inp:focus { border-color: var(--o); background: rgba(255,107,53,.04); box-shadow: 0 0 0 1px rgba(255,107,53,.18), inset 0 0 15px rgba(255,107,53,.03); }
        .inp.scan-input { font-family: var(--f-hud); font-size: 18px; font-weight: 700; letter-spacing: 3px; color: var(--g); border-color: rgba(0,255,157,.3); text-align: center;}
        
        .btn-connect { width: 100%; background:transparent; border:1px solid var(--o); color:var(--o); padding:15px; font-family:var(--f-hud); font-size:16px; font-weight:700; cursor:pointer; transition:.2s; clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px); text-transform:uppercase; letter-spacing: 2px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-connect:hover { background:var(--o); color:#000; box-shadow:0 0 20px rgba(255,107,53,.5); }
        .btn-connect.stop { border-color: var(--r); color: var(--r); }
        .btn-connect.stop:hover { background: var(--r); color: #fff; box-shadow:0 0 20px rgba(255,34,85,.5); }

        #reader { width: 100%; border: 1px solid var(--b); background: #000; display: none; position: relative;}
        #reader video { object-fit: cover; }
        .scan-beam-overlay { position:absolute; left:0; right:0; height:120px; background: linear-gradient(to bottom, transparent, rgba(0,212,255,.05) 45%, rgba(0,212,255,.1) 50%, rgba(0,212,255,.05) 55%, transparent ); pointer-events:none; z-index:19; animation: scan-beam 3s linear infinite; display: none;}
        
        .target-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 120px; z-index: 20; display: none; pointer-events: none; box-shadow: inset 0 0 20px rgba(255, 34, 85, 0.1); }
        .target-box::before, .target-box::after { content: ''; position: absolute; width: 25px; height: 25px; border-color: var(--r); border-style: solid; }
        .target-box::before { top: -2px; left: -2px; border-width: 4px 0 0 4px; }
        .target-box::after { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; }
        .target-box .corner-tr { position: absolute; top: -2px; right: -2px; width: 25px; height: 25px; border-color: var(--r); border-style: solid; border-width: 4px 4px 0 0; }
        .target-box .corner-bl { position: absolute; bottom: -2px; left: -2px; width: 25px; height: 25px; border-color: var(--r); border-style: solid; border-width: 0 0 4px 4px; }
        .laser-line { position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: var(--r); transform: translateY(-50%); animation: pulse-laser 1.5s infinite; }

        .result-box { text-align: center; padding: 15px 0 5px; }
        .result-name { font-size: 20px; font-weight: bold; color: var(--g); line-height: 1.3; text-shadow: 0 0 8px rgba(0,255,157,.5); margin-top: 5px;}
        .result-code { font-family: var(--f-hud); font-size: 12px; color: var(--txt2); letter-spacing: 2px;}

        .swal-cyberpunk { background: #061220 !important; border: 1px solid #00d4ff !important; color: #c8dff0 !important; font-family: 'Sarabun', sans-serif !important; box-shadow: 0 0 30px rgba(0,212,255,0.2) !important; clip-path: polygon(15px 0%,100% 0%,100% calc(100% - 15px),calc(100% - 15px) 100%,0% 100%,0% 15px); border-radius: 0 !important; }
        .swal-title { color: #00d4ff !important; font-family: 'Orbitron', sans-serif !important; letter-spacing: 2px; }
        .swal-confirm { background: #ff6b35 !important; color: #000 !important; font-weight: bold !important; font-family: 'Orbitron', sans-serif !important; border-radius: 0 !important; clip-path: polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0% 100%,0% 5px); }
        .swal-cancel { background: transparent !important; color: #ff2255 !important; border: 1px solid #ff2255 !important; font-weight: bold !important; border-radius: 0 !important; clip-path: polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0% 100%,0% 5px); }
    </style>
</head>
<body>

    <div class="header">
        <h1>CYBORG // UPLINK</h1>
        <div class="hud-sub"><span class="blink-dot"></span> MOBILE SCANNER MODULE</div>
    </div>

    <div id="status-bar" style="color: var(--o);">SYNCING CLOUD DATABASE...</div>

    <div class="container">
        <div class="panel">
            <div class="p-lbl">SYSTEM UPLINK (AUTO)</div>
            <div id="mqtt-status" class="inp" style="text-align: center; font-family: var(--f-hud); font-weight: bold; color: var(--b); pointer-events: none;">
                ESTABLISHING CONNECTION...
            </div>
        </div>

        <div class="panel">
            <div class="p-lbl">OPTICAL SCANNER</div>
            <button id="cam-btn" class="btn-connect" onclick="App.scanner.toggle()">[ O ] ENABLE OPTICS</button>
            <div style="margin-top: 15px;"></div>
            
            <div style="position: relative;">
                <div id="scan-beam-overlay" class="scan-beam-overlay"></div>
                <div id="target-box" class="target-box"><div class="corner-tr"></div><div class="corner-bl"></div><div class="laser-line"></div></div>
                <div id="reader"></div>
            </div>
            
            <div style="margin: 15px 0; color: var(--txt2); font-size: 11px; font-family: var(--f-hud); text-align: center; letter-spacing: 2px;">-- MANUAL OVERRIDE --</div>
            
            <form onsubmit="event.preventDefault(); App.state.processManual();">
                <input type="text" id="barcode-input" class="inp scan-input" placeholder="AWAITING INPUT..." autocomplete="off">
            </form>
        </div>

        <div class="panel">
            <div class="p-lbl">LATEST TRANSMISSION</div>
            <div class="result-box">
                <div id="result-code" class="result-code">STANDBY...</div>
                <div id="result-name" class="result-name" style="color: var(--txt2);">ระบบพร้อมทำงาน</div>
            </div>
        </div>
    </div>

    <script>
        // =========================================================================
        const CLOUD_DB_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSF-0v8K7CwUzsuHEbGsXJ3Ga4c2MU6jiIYzqwrmKLCR3xBP5jgDkhBuFWQz3u7Xq3JEDJZsbYQodBX/pub?gid=857533628&single=true&output=csv"; 
        
        // 🔒 AUTO-SYNC TOPIC สำหรับร้านวงเวียน
        const AUTO_SYNC_TOPIC = "cyborg-tag-sys-wongwian-v8";
        // =========================================================================

        const Utils = {
            escapeHTML: (str) => {
                if (!str) return '';
                return String(str).replace(/[&<>'"]/g, tag => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
                }[tag]));
            }
        };

        class DatabaseService {
            constructor() { this.data = []; }
            load() {
                Papa.parse(CLOUD_DB_URL, {
                    download: true, header: true, skipEmptyLines: true,
                    complete: (res) => {
                        if(res.data) this.data = res.data;
                        App.mqtt.connect(); 
                    },
                    error: () => App.mqtt.connect()
                });
            }
            find(code) { return this.data.find(p => String(p.Barcode||p.barcode||p['บาร์โค้ด']) === String(code)); }
        }

        class MQTTService {
            constructor() { this.client = null; }
            connect() {
                const statusBar = document.getElementById('status-bar');
                const mqttBox = document.getElementById('mqtt-status');
                
                this.client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
                this.client.on('connect', () => {
                    statusBar.innerText = `[ DB SYNCED ] READY`;
                    statusBar.style.color = "var(--g)";
                    mqttBox.innerText = `UPLINK SECURED (AUTO)`;
                    mqttBox.style.color = "var(--g)";
                    mqttBox.style.borderColor = "rgba(0,255,157,.3)";
                });
                this.client.on('offline', () => {
                    mqttBox.innerText = `[ UPLINK LOST ] RETRYING...`;
                    mqttBox.style.color = "var(--r)";
                    mqttBox.style.borderColor = "var(--r)";
                });
            }
            send(barcode, exp = '') {
                if (this.client && this.client.connected) {
                    this.client.publish(AUTO_SYNC_TOPIC, JSON.stringify({ barcode: barcode, exp: exp }));
                    return true;
                }
                return false;
            }
        }

        class ScannerEngine {
            constructor() { 
                this.html5QrcodeScanner = null; 
                this.isScanning = false; 
                this.isProcessing = false; 
            }

            handleScan(barcode) {
                if (!barcode || this.isProcessing) return;
                this.isProcessing = true; 
                App.state.confirmPayload(barcode);
            }

            toggle() {
                const btn = document.getElementById('cam-btn');
                const readerDiv = document.getElementById('reader');
                const beam = document.getElementById('scan-beam-overlay');
                const targetBox = document.getElementById('target-box');

                if (this.isScanning) {
                    if(this.html5QrcodeScanner) {
                        this.html5QrcodeScanner.stop().then(() => {
                            readerDiv.style.display = "none"; beam.style.display = "none"; targetBox.style.display = "none";
                            btn.innerHTML = "[ O ] ENABLE OPTICS"; btn.classList.remove('stop');
                            this.isScanning = false;
                        }).catch(e => console.log(e));
                    }
                } else {
                    readerDiv.style.display = "block"; beam.style.display = "block"; targetBox.style.display = "block";
                    btn.innerHTML = "[ X ] DISABLE OPTICS"; btn.classList.add('stop');
                    
                    this.html5QrcodeScanner = new Html5Qrcode("reader");
                    const config = { 
                        fps: 15, 
                        qrbox: function(vw, vh) { return { width: vw * 0.85, height: 120 }; },
                        formatsToSupport: [ Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8, Html5QrcodeSupportedFormats.UPC_A ]
                    };

                    this.html5QrcodeScanner.start(
                        { facingMode: "environment" }, config,
                        (decodedText) => { this.handleScan(decodedText); },
                        (error) => { /* Ignore read errors */ }
                    ).catch(err => {
                        alert("⚠️ ERROR: CAMERA MODULE OFFLINE");
                        readerDiv.style.display = "none"; beam.style.display = "none"; targetBox.style.display = "none";
                        btn.innerHTML = "[ O ] ENABLE OPTICS"; btn.classList.remove('stop');
                        this.isScanning = false;
                    });
                    this.isScanning = true;
                }
            }
        }

        class StateManager {
            constructor() { this.audioCtx = null; }
            
            beep() {
                try {
                    if(!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    if(this.audioCtx.state === 'suspended') this.audioCtx.resume();
                    const osc = this.audioCtx.createOscillator();
                    const gain = this.audioCtx.createGain();
                    osc.connect(gain); gain.connect(this.audioCtx.destination);
                    osc.type = 'sine'; osc.frequency.setValueAtTime(1000, this.audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.3, this.audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.1);
                    osc.start(); osc.stop(this.audioCtx.currentTime + 0.1);
                } catch(e) {}
                if (navigator.vibrate) navigator.vibrate([50]); 
            }

            processManual() {
                const input = document.getElementById('barcode-input');
                const val = input.value.trim();
                if(val) {
                    App.scanner.isProcessing = true;
                    this.confirmPayload(val);
                }
                input.value = ''; input.blur(); 
            }

            confirmPayload(barcode) {
                this.beep();
                const product = App.database.find(barcode);
                
                // เช็คสถานะสินค้าเพื่อทำ UI สี
                const isFound = !!product;
                const safeBarcode = Utils.escapeHTML(barcode);
                const safeName = isFound ? Utils.escapeHTML(product.ProductName || product.name || product['ชื่อสินค้า']) : "⚠️ ไม่พบในระบบ (ต้องพิมพ์ชื่อเองบนคอม)";
                
                // 🟢 ดึงข้อมูล "ราคา" (ดักจับชื่อคอลัมน์หลายรูปแบบ)
                const rawPrice = isFound ? (product.Price || product.price || product['ราคา'] || product.SalePrice || 'ไม่ระบุ') : '-';
                const safePrice = Utils.escapeHTML(String(rawPrice));

                const statusColor = isFound ? 'var(--g)' : 'var(--r)';
                const statusText = isFound ? '✓ TARGET ACQUIRED' : '✕ UNKNOWN TARGET';

                document.getElementById('result-code').innerText = `[ CODE: ${safeBarcode} ]`;
                document.getElementById('result-name').innerText = "รอการยืนยัน...";
                document.getElementById('result-name').style.color = "var(--o)";

                // 🔴 สร้าง HTML สำหรับ Popup พร้อมช่องใส่วันหมดอายุ และแสดงราคา
                const swalHtml = `
                    <div style="font-family:'Orbitron'; font-size:12px; color:${statusColor}; letter-spacing:2px; margin-bottom:5px;">${statusText}</div>
                    <div style="font-family:'Orbitron'; font-size:24px; color:var(--b); margin-bottom:10px; text-shadow: 0 0 10px rgba(0,212,255,.3);">${safeBarcode}</div>
                    
                    <div style="background: rgba(0,0,0,0.5); border: 1px solid ${statusColor}; padding: 15px; margin-bottom: 20px; border-radius: 4px;">
                        <div style="font-family:'Sarabun'; font-size: ${isFound ? '22px' : '18px'}; font-weight: bold; color: ${isFound ? '#fff' : '#ff4444'}; line-height: 1.3;">${safeName}</div>
                        ${isFound && safePrice !== 'ไม่ระบุ' ? `<div style="font-family:'Orbitron', 'Sarabun'; font-size: 20px; color: var(--o); margin-top: 10px; font-weight: bold; letter-spacing: 1px;">PRICE: ฿${safePrice}</div>` : ''}
                    </div>
                    
                    <div style="text-align: left; padding: 0 10px;">
                        <label style="color:var(--txt2); font-size:12px; font-family:'Orbitron'; letter-spacing:1px;">EXP DATE / วันหมดอายุ (ถ้ามี)</label>
                        <input type="text" id="swal-exp-input" class="inp" placeholder="เช่น 12/25 หรือเว้นว่างไว้" style="margin-top:5px; text-align:center; border-color: rgba(0,212,255,0.3); font-size:18px;">
                    </div>
                `;

                Swal.fire({
                    html: swalHtml,
                    showCancelButton: true,
                    confirmButtonText: '[ SEND ] ส่งเข้าคิว',
                    cancelButtonText: '[ X ] ยกเลิก',
                    customClass: { popup: 'swal-cyberpunk', title: 'swal-title', confirmButton: 'swal-confirm', cancelButton: 'swal-cancel' },
                    allowOutsideClick: false,
                    preConfirm: () => {
                        // ดึงค่าวันที่ออกจาก input ก่อนปิด popup
                        return document.getElementById('swal-exp-input').value.trim();
                    }
                }).then((result) => {
                    if (result.isConfirmed) {
                        const expValue = result.value; // ค่าวันหมดอายุที่ได้รับมา
                        const success = App.mqtt.send(barcode, expValue);
                        
                        if (success) {
                            // 🟢 อัปเดตหน้าจอหลักให้แสดงชื่อพร้อมราคา
                            document.getElementById('result-name').innerHTML = `${safeName} <br><span style="font-size:14px; color:var(--o); font-family: 'Orbitron', 'Sarabun'; letter-spacing: 1px;">PRICE: ฿${safePrice}</span>`;
                            document.getElementById('result-name').style.color = "var(--g)";
                            if (navigator.vibrate) navigator.vibrate([50, 50, 50]); 
                        } else {
                            document.getElementById('result-name').innerText = "⚠️ UPLINK FAILED";
                            document.getElementById('result-name').style.color = "var(--r)";
                        }
                    } else {
                        document.getElementById('result-name').innerText = "ยกเลิกการส่ง";
                        document.getElementById('result-name').style.color = "var(--r)";
                    }
                    setTimeout(() => { App.scanner.isProcessing = false; }, 500);
                });
            }
        }

        const App = {
            database: new DatabaseService(),
            mqtt: new MQTTService(),
            scanner: new ScannerEngine(),
            state: new StateManager(),
            init: function() { this.database.load(); }
        };

        document.addEventListener("DOMContentLoaded", () => App.init());
        document.body.addEventListener('click', () => { if(App.state.audioCtx === null) App.state.beep(); }, { once: true });
    </script>
</body>
</html>
